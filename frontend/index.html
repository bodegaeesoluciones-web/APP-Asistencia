<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Sistema de Asistencia</title>
  <meta name="description" content="Sistema de control de asistencia para técnicos de campo. Ingresa con tus credenciales para registrar tu asistencia." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #10b981;
      --danger: #ef4444;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-border: rgba(99, 102, 241, 0.2);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --input-focus: rgba(99, 102, 241, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 50% -20%, rgba(99,102,241,0.3), transparent),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(16,185,129,0.15), transparent);
      z-index: 0;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 400px; height: 400px;
      background: rgba(99,102,241,0.15);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 300px; height: 300px;
      background: rgba(16,185,129,0.1);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.05); }
    }

    /* Login Card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 1px 0 rgba(255,255,255,0.1) inset;
      backdrop-filter: blur(20px);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 25px rgba(99,102,241,0.4);
    }

    .login-title {
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 0.8rem 1rem 0.8rem 2.75rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      outline: none;
    }

    .form-control::placeholder { color: rgba(148,163,184,0.5); }

    .form-control:focus {
      border-color: var(--primary);
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    .form-control:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--primary-light);
    }

    /* Reorder so icon is after input for CSS sibling selector */
    .input-wrapper .form-control { order: 1; }
    .input-wrapper .input-icon { order: 2; }

    /* Actually use before/after trick instead */
    .input-field {
      position: relative;
    }

    .input-field input {
      padding-left: 2.75rem;
    }

    .input-field .icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-field input:focus ~ .icon {
      color: var(--primary-light);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.75rem;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.5);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 0.875rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .alert-info {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .device-notice {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 1.25rem;
      font-size: 0.8rem;
      color: #6ee7b7;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    /* Role selector */
    .role-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 4px;
    }

    .role-tab {
      flex: 1;
      padding: 0.5rem;
      text-align: center;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      user-select: none;
    }

    .role-tab.active {
      background: rgba(99,102,241,0.2);
      color: var(--primary-light);
      box-shadow: 0 2px 8px rgba(99,102,241,0.2);
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">🛡️</div>
        <span class="login-title">AsistTrack</span>
      </div>
      <p class="login-subtitle">Sistema de Control de Asistencia</p>

      <!-- Alert Container -->
      <div id="alertContainer"></div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <div class="input-field">
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Ingresa tu usuario"
              required
              autocomplete="username"
            />
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-field">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
            />
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
        </div>

        <div class="device-notice" id="deviceNotice">
          <svg style="width:16px;height:16px;flex-shrink:0;margin-top:1px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          <span>Este dispositivo será registrado automáticamente en tu primer inicio de sesión.</span>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Iniciar Sesión
        </button>
      </form>

      <div class="login-footer">
        Sistema EE Soluciones · Versión 1.0
      </div>
    </div>
  </div>

  <script type="module">
    // Device Fingerprinting
    function generateFingerprint() {
      const data = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.platform || '',
      ].join('|');

      // Simple hash
      let hash = 0;
      for (let i = 0; i < data.length; i++) {
        const char = data.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(36) + '-' + data.length.toString(36);
    }

    const deviceFingerprint = generateFingerprint();

    function showAlert(message, type = 'error') {
      const container = document.getElementById('alertContainer');
      const iconMap = {
        error: `<svg style="width:18px;height:18px;flex-shrink:0;margin-top:1px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        info: `<svg style="width:18px;height:18px;flex-shrink:0;margin-top:1px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
      };
      container.innerHTML = `
        <div class="alert alert-${type}">
          ${iconMap[type] || ''}
          <span>${message}</span>
        </div>
      `;
    }

    function clearAlert() {
      document.getElementById('alertContainer').innerHTML = '';
    }

    function setLoading(loading) {
      const btn = document.getElementById('btnLogin');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> Verificando...`;
      } else {
        btn.disabled = false;
        btn.innerHTML = `
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Iniciar Sesión
        `;
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert('Por favor completa todos los campos.');
        return;
      }

      setLoading(true);

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password,
            deviceFingerprint,
            deviceName: navigator.userAgent.substring(0, 100),
          }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          if (data.code === 'DEVICE_NOT_AUTHORIZED') {
            showAlert('⚠️ Dispositivo no autorizado. Ya tienes un dispositivo registrado. Contacta al administrador para reasignar tu dispositivo.');
          } else {
            showAlert(data.error || 'Error al iniciar sesión. Verifica tus credenciales.');
          }
          return;
        }

        // Store tokens
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('userRole', data.user.role);
        localStorage.setItem('userName', data.user.fullName);
        localStorage.setItem('deviceFingerprint', deviceFingerprint);

        // Redirect based on role
        if (data.user.role === 'admin') {
          localStorage.clear();
          showAlert('El panel de administrador solo está disponible desde la aplicación de escritorio en la recepción.', 'error');
          return;
        } else {
          window.location.href = '/src/pages/technician/index.html';
        }

      } catch (err) {
        console.error('Login error:', err);
        showAlert('Error de conexión. Verifica que el servidor esté disponible.');
      } finally {
        setLoading(false);
      }
    });

    // Check if already logged in
    const token = localStorage.getItem('accessToken');
    const role = localStorage.getItem('userRole');
    if (token && role) {
      if (role === 'admin') {
        localStorage.clear();
      } else {
        window.location.href = '/src/pages/technician/index.html';
      }
    }
  </script>
</body>
</html>
