<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AsistTrack — Iniciar Sesión</title>
  <meta name="description" content="Sistema de control de asistencia EESOLUCIONES. Marca tu asistencia de forma rápida y segura." />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:       #3b82f6;
      --primary-dark:  #1d4ed8;
      --primary-glow:  rgba(59,130,246,0.3);
      --success:       #10b981;
      --danger:        #ef4444;
      --bg:            #0a0f1e;
      --card:          rgba(255,255,255,0.04);
      --border:        rgba(255,255,255,0.08);
      --border-focus:  rgba(59,130,246,0.5);
      --text:          #f1f5f9;
      --text-muted:    #64748b;
      --text-sec:      #94a3b8;
      --input-bg:      rgba(255,255,255,0.05);
      --input-bg-focus:rgba(59,130,246,0.07);
      --radius:        14px;
      --radius-sm:     10px;
      --transition:    0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% -10%, rgba(59,130,246,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 100% 100%, rgba(16,185,129,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 0% 80%, rgba(99,102,241,0.08) 0%, transparent 55%);
      z-index: 0;
      pointer-events: none;
      animation: bgShift 12s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      from { opacity: 1; }
      to   { opacity: 0.7; }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      z-index: 0;
      pointer-events: none;
      animation: floatOrb 10s ease-in-out infinite;
    }
    .orb-1 { width: 350px; height: 350px; background: rgba(59,130,246,0.12); top: -80px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 250px; height: 250px; background: rgba(16,185,129,0.08); bottom: -60px; right: -60px; animation-delay: -5s; }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -25px); }
    }

    /* Page layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Brand mark above card */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.75rem;
      animation: fadeDown 0.5s ease both;
    }

    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--success) 100%);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px var(--primary-glow);
    }

    .brand-name {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #fff 0%, var(--text-sec) 120%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Login card */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2rem 1.75rem;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.05) inset;
      backdrop-filter: blur(20px);
      animation: slideUp 0.55s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 0.25rem;
    }
    .card-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* Alert */
    .alert {
      border-radius: var(--radius-sm);
      padding: 0.8rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      display: flex; align-items: flex-start; gap: 0.5rem;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert-error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
    .alert-warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); color: #fcd34d; }

    /* Form */
    .form-group { margin-bottom: 1rem; }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-sec);
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 0.9rem;
      width: 18px; height: 18px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition);
      flex-shrink: 0;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: rgba(100,116,139,0.55); }
    .form-input:focus {
      border-color: var(--primary);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--primary); }

    /* Need icon before input to use sibling selector */
    .input-wrap .input-icon { order: 2; left: auto; right: 0; }
    /* Actually let's use absolute positioning trick already set. Fix: icon is absolutely positioned, no need for order. */
    /* Revert: just keep as-is with absolute positioning */

    /* Show/hide password toggle */
    .toggle-pw {
      position: absolute;
      right: 0.85rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex; align-items: center;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--text); }

    /* Submit */
    .btn-submit {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.95rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.2px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 24px var(--primary-glow);
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px var(--primary-glow);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Info notice */
    .info-notice {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.18);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #6ee7b7;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .info-notice svg { flex-shrink: 0; margin-top: 1px; }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page">
    <!-- Brand above card -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="30" height="30" viewBox="0 0 200 200" fill="none">
          <circle cx="100" cy="100" r="95" stroke="white" stroke-width="10" fill="none"/>
          <path d="M 100 30 A 45 45 0 0 1 145 75" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
          <line x1="100" y1="55" x2="100" y2="78" stroke="white" stroke-width="6" stroke-linecap="round"/>
          <line x1="100" y1="78" x2="122" y2="88" stroke="white" stroke-width="6" stroke-linecap="round"/>
          <circle cx="100" cy="78" r="4" fill="white"/>
          <circle cx="85" cy="75" r="14" fill="white"/>
          <path d="M 58 112 Q 58 92 85 92 Q 112 92 112 112" fill="white"/>
          <path d="M 112 100 L 122 115 L 142 90" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="brand-name">AsistTrack</span>
    </div>

    <!-- Login card -->
    <div class="card">
      <h1 class="card-title">Bienvenido</h1>
      <p class="card-subtitle">Ingresa tus credenciales para continuar</p>

      <!-- Alert -->
      <div id="alertContainer"></div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Tu nombre de usuario"
              autocomplete="username"
              required
            />
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Tu contraseña"
              autocomplete="current-password"
              required
            />
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="info-notice">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          <span>Tu dispositivo se registrará automáticamente en el primer inicio de sesión.</span>
        </div>

        <button type="submit" class="btn-submit" id="btnLogin">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Iniciar Sesión
        </button>
      </form>
    </div>

    <div class="footer">EESOLUCIONES · AsistTrack © 2025</div>
  </div>

  <script>
    // ── Toggle password visibility ──
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    });

    // ── Device fingerprint ──
    function generateFingerprint() {
      const data = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.platform || '',
      ].join('|');
      let hash = 0;
      for (let i = 0; i < data.length; i++) {
        const c = data.charCodeAt(i);
        hash = ((hash << 5) - hash) + c;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(36) + '-' + data.length.toString(36);
    }

    const deviceFingerprint = generateFingerprint();

    // ── Alert helpers ──
    function showAlert(msg, type = 'error') {
      const icons = { error: '⚠️', warning: '⚡' };
      document.getElementById('alertContainer').innerHTML = `
        <div class="alert alert-${type}">
          <span>${icons[type] || '⚠️'}</span>
          <span>${msg}</span>
        </div>`;
    }
    function clearAlert() { document.getElementById('alertContainer').innerHTML = ''; }

    // ── Loading state ──
    function setLoading(on) {
      const btn = document.getElementById('btnLogin');
      if (on) {
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> Verificando...`;
      } else {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Iniciar Sesión`;
      }
    }

    // ── Configuration ──
    // If frontend and backend are hosted separately on Render, change API_BASE to the backend URL.
    // Example: const API_BASE = 'https://my-backend.onrender.com/api';
    const API_BASE = '/api';

    // ── Already logged in ──
    const token = localStorage.getItem('accessToken');
    const role  = localStorage.getItem('userRole');
    if (token && role) {
      if (role !== 'admin') {
        // Prevent infinite reload if server incorrectly returns index.html for technician path
        if (!window.location.pathname.includes('/technician/')) {
          window.location.href = '/src/pages/technician/index.html';
        }
      } else {
        localStorage.clear();
      }
    }

    // ── Login submit ──
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert('Por favor completa todos los campos.');
        return;
      }

      setLoading(true);

      try {
        const resp = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password,
            deviceFingerprint,
            deviceName: navigator.userAgent.substring(0, 100),
          }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          if (data.code === 'DEVICE_NOT_AUTHORIZED') {
            showAlert('Dispositivo no autorizado. Contacta al administrador para registrar este dispositivo.');
          } else {
            showAlert(data.error || 'Credenciales incorrectas. Verifica usuario y contraseña.');
          }
          return;
        }

        // Admins can only use the desktop app
        if (data.user.role === 'admin') {
          showAlert('El panel de administración solo está disponible desde la aplicación de escritorio.', 'warning');
          return;
        }

        // Store session
        localStorage.setItem('accessToken',  data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('userId',   data.user.id);
        localStorage.setItem('userRole', data.user.role);
        localStorage.setItem('userName', data.user.fullName || data.user.full_name || username);
        localStorage.setItem('deviceFingerprint', deviceFingerprint);

        // Redirect
        window.location.href = '/src/pages/technician/index.html';

      } catch (err) {
        showAlert('Error de conexión. Verifica que el servidor esté disponible.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
